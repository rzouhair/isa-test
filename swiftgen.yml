xcassets:
  - inputs:
    - isaprep/Presentation/Resources/Colors.xcassets
    - isaprep/Presentation/Resources/Images.xcassets
    outputs:
      templateName: swift5
      output: isaprep/Presentation/Generated/Assets.swift
      params:
        publicAccess: true

fonts:
  inputs: isaprep/Presentation/Resources/Fonts
  outputs:
    templateName: swift5
    output: isaprep/Presentation/Generated/Fonts.swift