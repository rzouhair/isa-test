xcassets:
  - inputs:
    - paperscan/Presentation/Resources/Colors.xcassets
    - paperscan/Presentation/Resources/Images.xcassets
    outputs:
      templateName: swift5
      output: paperscan/Presentation/Generated/Assets.swift
      params:
        publicAccess: true

fonts:
  inputs: paperscan/Presentation/Resources/Fonts
  outputs:
    templateName: swift5
    output: paperscan/Presentation/Generated/Fonts.swift