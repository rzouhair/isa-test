xcassets:
  - inputs:
    - poke/Presentation/Resources/Colors.xcassets
    - poke/Presentation/Resources/Images.xcassets
    outputs:
      templateName: swift5
      output: poke/Presentation/Generated/Assets.swift
      params:
        publicAccess: true

fonts:
  inputs: poke/Presentation/Resources/Fonts
  outputs:
    templateName: swift5
    output: poke/Presentation/Generated/Fonts.swift