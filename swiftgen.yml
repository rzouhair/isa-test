xcassets:
  - inputs:
    - examprep/Presentation/Resources/Colors.xcassets
    - examprep/Presentation/Resources/Images.xcassets
    outputs:
      templateName: swift5
      output: examprep/Presentation/Generated/Assets.swift
      params:
        publicAccess: true

fonts:
  inputs: examprep/Presentation/Resources/Fonts
  outputs:
    templateName: swift5
    output: examprep/Presentation/Generated/Fonts.swift