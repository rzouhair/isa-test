xcassets:
  - inputs:
    - notescan/Presentation/Resources/Colors.xcassets
    - notescan/Presentation/Resources/Images.xcassets
    outputs:
      templateName: swift5
      output: notescan/Presentation/Generated/Assets.swift
      params:
        publicAccess: true

fonts:
  inputs: notescan/Presentation/Resources/Fonts
  outputs:
    templateName: swift5
    output: notescan/Presentation/Generated/Fonts.swift